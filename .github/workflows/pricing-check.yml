name: Check model pricing drift

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9:00 UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  check-pricing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm install playwright@latest
          npx playwright install chromium --with-deps

      - name: Check pricing pages for changes
        run: node scripts/check-pricing.mjs

      - name: Create PR if pricing changed
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git diff --name-only)" ]; then
            echo "No pricing changes detected."
            exit 0
          fi

          BRANCH="chore/pricing-update-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add cli/src/pricing.ts
          git commit -m "$(cat <<'EOF'
          chore: update model pricing table

          Automated pricing drift detected by weekly check.
          Review the changes carefully before merging.
          EOF
          )"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: update model pricing table" \
            --body "$(cat <<'EOF'
          ## Automated pricing update

          The weekly pricing check detected differences between our hardcoded
          pricing table and the current published prices.

          **Please review carefully** — the script extracts prices from provider
          pages using pattern matching, which can occasionally misparse.

          ### Checklist
          - [ ] Verify Anthropic prices against https://platform.claude.com/docs/en/about-claude/pricing
          - [ ] Verify OpenAI prices against https://platform.openai.com/docs/pricing
          - [ ] Verify Google prices against https://ai.google.dev/gemini-api/docs/pricing

          Generated by the [weekly pricing check workflow](../actions/workflows/pricing-check.yml).
          EOF
          )"
